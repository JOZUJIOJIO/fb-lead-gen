version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: leadflow
      POSTGRES_USER: leadflow
      POSTGRES_PASSWORD: leadflow_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://leadflow:leadflow_dev_password@postgres:5432/leadflow
      REDIS_URL: redis://redis:6379/0
      AI_PROVIDER: ${AI_PROVIDER:-kimi}
      KIMI_API_KEY: ${KIMI_API_KEY}
      KIMI_BASE_URL: ${KIMI_BASE_URL:-https://api.moonshot.cn/v1}
      KIMI_MODEL: ${KIMI_MODEL:-kimi-latest}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      WHATSAPP_BUSINESS_TOKEN: ${WHATSAPP_BUSINESS_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://leadflow:leadflow_dev_password@postgres:5432/leadflow
      REDIS_URL: redis://redis:6379/0
      AI_PROVIDER: ${AI_PROVIDER:-kimi}
      KIMI_API_KEY: ${KIMI_API_KEY}
      KIMI_BASE_URL: ${KIMI_BASE_URL:-https://api.moonshot.cn/v1}
      KIMI_MODEL: ${KIMI_MODEL:-kimi-latest}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      WHATSAPP_BUSINESS_TOKEN: ${WHATSAPP_BUSINESS_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
    command: celery -A app.tasks.celery_app worker --loglevel=info

volumes:
  postgres_data:
  redis_data:
