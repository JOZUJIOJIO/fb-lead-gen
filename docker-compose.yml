services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: leadflow
      POSTGRES_PASSWORD: leadflow123
      POSTGRES_DB: leadflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leadflow -d leadflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - path: backend/.env
        required: false
      - path: backend/.env.example
        required: false
    environment:
      DISPLAY: ":99"
    volumes:
      - ./backend/app:/app/app
      - browser_data:/tmp/leadflow-browser
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  browser_data:
